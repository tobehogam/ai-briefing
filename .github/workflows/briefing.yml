name: Morning Finance AI Briefing

on:
  schedule:
    # 매일 한국 시간 오전 8시 (UTC 기준 23시)
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install packages
      # 한국 시간(KST) 적용을 위한 pytz 패키지 추가!
      run: pip install requests yfinance google-genai pandas pytz

    - name: Run briefing
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python briefing.py
