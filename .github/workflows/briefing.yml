name: Morning Finance AI Briefing

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install packages
      # 여기에 제미나이(google-generativeai)랑 판다스(pandas)를 예쁜이가 딱 추가했어!
      run: pip install requests yfinance google-generativeai pandas

    - name: Run briefing
      env:
        # 쓸데없는 NEWS_API_KEY는 날려버렸어!
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python briefing.py
