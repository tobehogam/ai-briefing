name: Morning Finance AI Briefing

on:
  schedule:
    # 한국 시간 오전 7시 17분 (UTC 22:17)으로 변경
    - cron: "17 22 * * *"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    # 🚨 Node.js 20 경고 해결을 위해 선제적으로 Node.js 24 사용 강제 적용
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install packages
      # 한국 시간(KST) 적용을 위한 pytz 패키지 추가!
      run: pip install requests yfinance google-genai pandas pytz

    - name: Run briefing
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python briefing.py
